<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <base href="%BASE_URL%" />
    <title>AdminUI</title>
    <link rel="icon" type="image/x-icon" href="%BASE_URL%favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%favicon-16x16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimal-ui" />
    <style>
      html.theme-dark {
        --initial-page-bg: #0b2947;
      }
      html.theme-light {
        --initial-page-bg: #f6f6f6;
      }
      html,
      body {
        background-color: var(--initial-page-bg, #0b2947);
        min-height: 100%;
        margin: 0;
      }
    </style>
    <script>
      ;(() => {
        try {
          const theme = localStorage.getItem('initTheme') === 'light' ? 'theme-light' : 'theme-dark'
          document.documentElement.classList.add(theme)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <!-- <script>
      window.configApiBaseUrl = '%(configApiBaseUrl)s'
      window.apiBaseUrl = '%(apiBaseUrl)s'
    </script> -->
    <script src="/admin/env-config.js"></script>
    <div id="root"></div>
    <script type="module" src="/app/index.tsx"></script>
  </body>
</html>

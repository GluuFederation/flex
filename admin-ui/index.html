<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <base href="%BASE_URL%" />
    <title>AdminUI</title>
    <link rel="icon" type="image/x-icon" href="%BASE_URL%favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%favicon-16x16.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=0, minimal-ui"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/react-block-ui/1.3.3/style.min.css"
      integrity="sha512-xWWegjvDLeMuBGpiCf9QlX0IdtN8lEBbVD1vd0Rr+zo2b2Lnp7ZP5LL6E873lHBhTBftB6Rk+4+AVLLW0M8nCA=="
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <style>
      html.theme-dark {
        --initial-page-bg: #0b2947;
      }
      html.theme-light {
        --initial-page-bg: #f6f6f6;
      }
      html,
      body {
        background-color: var(--initial-page-bg, #0b2947);
        min-height: 100%;
        margin: 0;
      }
    </style>
    <script>
      ;(() => {
        try {
          const theme = localStorage.getItem('initTheme') === 'light' ? 'theme-light' : 'theme-dark'
          document.documentElement.classList.add(theme)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <script>
      window.configApiBaseUrl = 'https://%(hostname)s/jans-config-api'
      window.apiBaseUrl = 'https://%(hostname)s/jans-config-api/admin-ui'
    </script>
    <div id="root"></div>
    <script type="module" src="/app/index.tsx"></script>
  </body>
</html>

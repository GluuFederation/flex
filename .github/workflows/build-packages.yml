name: Publish packages

on:
  push:
    tags:
    - 'v**'
    - 'nightly'
  workflow_dispatch:
    inputs:
      target_tag:
        description: 'The release tag to upload assets to (e.g., v1.0.1 or nightly). Required.'
        required: true
        type: string
      run_binary_packages:
        description: 'Run the "publish_binary_packages" job?'
        required: true
        type: boolean
        default: true
      jans_branch:
        description: 'Override the jans --jans-branch. Leave empty to derive from the tag (flex is +4 major, so v6.2.0 -> jans v2.2.0; nightly -> nightly).'
        required: false
        type: string
        default: ''
      jans_setup_branch:
        description: 'Override the jans --jans-setup-branch. Leave empty to use the resolved jans_branch.'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  publish_binary_packages:
    if: |
      github.repository == 'GluuFederation/flex' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_binary_packages))
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        name: [ubuntu24, ubuntu22, debian13, el9, el10, suse16]
        include:
          - name: ubuntu24
            os: ubuntu-22.04
            asset_suffix: ~ubuntu24.04_amd64.deb
            build_files: deb/noble
            asset_prefix: '_'
            asset_path: flex
            python_version: 3.11
          - name: ubuntu22
            os: ubuntu-22.04
            asset_suffix: ~ubuntu22.04_amd64.deb
            build_files: deb/jammy
            asset_prefix: '_'
            asset_path: flex
            python_version: '3.10'
          - name: debian13
            os: ubuntu-22.04
            asset_suffix: ~debian13_amd64.deb
            build_files: deb/trixie
            asset_prefix: '_'
            asset_path: flex
            python_version: 3.11
          - name: el9
            os: ubuntu-22.04
            asset_suffix: .el9.x86_64.rpm
            build_files: rpm/el9
            asset_prefix: '-'
            asset_path: flex/rpmbuild/RPMS/x86_64
            python_version: 3.11
          - name: el10
            os: ubuntu-22.04
            asset_suffix: .el10.x86_64.rpm
            build_files: rpm/el10
            asset_prefix: '-'
            asset_path: flex/rpmbuild/RPMS/x86_64
            python_version: 3.11
          - name: suse16
            os: ubuntu-24.04
            asset_suffix: .suse16.x86_64.rpm
            build_files: rpm/suse16
            asset_prefix: '-'
            asset_path: flex/rpmbuild/RPMS/x86_64
            python_version: 3.11

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        path: temp-flex

    - name: Getting build dependencies
      id: get_dependencies
      run: |
        mkdir -p flex/flex-src/opt/
        cp -rp temp-flex/automation/packaging/${{ matrix.build_files }}/* flex/
        cp temp-flex/flex-linux-setup/flex_linux_setup/flex_setup.py flex/flex_setup.py
        sudo add-apt-repository -y ppa:deadsnakes/ppa
        sudo apt-get update
        sudo apt-get install -y python${{ matrix.python_version }} python${{ matrix.python_version }}-dev python${{ matrix.python_version }}-distutils
        sudo apt install -y build-essential devscripts debhelper rpm libpq-dev apache2 rsyslog postgresql postgresql-contrib
        sudo python${{ matrix.python_version }} -m ensurepip || sudo apt-get install -y python3-pip
        sudo PIP_BREAK_SYSTEM_PACKAGES=1 python${{ matrix.python_version }} -m pip install \
        --ignore-installed \
        cryptography urllib3 certifi requests ruamel.yaml pymysql psycopg2-binary
    - name: Get tag and version
      id: previoustag
      # Inputs/contexts are passed through env (never inlined into the script) so a
      # crafted value cannot inject shell.
      env:
        EVENT_NAME: ${{ github.event_name }}
        TARGET_TAG: ${{ inputs.target_tag }}
        EVENT_REF: ${{ github.event.ref }}
      run: |
        if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
          TAG_NAME="${TARGET_TAG}"
        else
          TAG_NAME=$(echo "${EVENT_REF}" | cut -d '/' -f 3)
        fi

        printf 'tag=%s\n' "${TAG_NAME}" >> "$GITHUB_OUTPUT"
        if [[ "${TAG_NAME}" == "nightly" ]]; then
          printf 'version=%s\n' "0.0.0-nightly" >> "$GITHUB_OUTPUT"
        else
          printf 'version=%s-stable\n' "${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
        fi
        printf 'PACKAGE_PREFIX=flex\n' >> "$GITHUB_ENV"

    - name: Set Branch Parameters
      id: set_branches
      # Inputs come through env (never inlined into the script). jans_branch and
      # jans_setup_branch are each honored independently when supplied; otherwise the
      # jans branch is derived from the flex tag (flex is +4 major: v6.2.0 -> v2.2.0).
      env:
        EVENT_NAME: ${{ github.event_name }}
        IN_JANS_BRANCH: ${{ inputs.jans_branch }}
        IN_JANS_SETUP_BRANCH: ${{ inputs.jans_setup_branch }}
        TAG_NAME: ${{ steps.previoustag.outputs.tag }}
      run: |
        # Reject override inputs that aren't a plain git ref name -- blocks shell /
        # GITHUB_ENV injection via embedded newlines or quotes.
        valid_ref() { [[ "$1" =~ ^[A-Za-z0-9._/-]+$ ]]; }

        # Map the flex tag to its jans branch. Only a full vX.Y.Z with major >= 4
        # (flex's offset) maps; nightly passes through; anything else fails before a
        # bad/negative branch is ever used.
        derive_jans_branch() {
          if [[ "${TAG_NAME}" == "nightly" ]]; then echo "nightly"; return 0; fi
          local ver="${TAG_NAME#v}"
          if [[ ! "${ver}" =~ ^([0-9]+)\.([0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?)$ ]]; then
            echo "::error::tag '${TAG_NAME}' is not vX.Y.Z; cannot derive a jans branch" >&2
            return 1
          fi
          local major="${BASH_REMATCH[1]}" rest="${BASH_REMATCH[2]}"
          if (( major < 4 )); then
            echo "::error::flex major ${major} has no jans counterpart (flex is +4 ahead; need >= 4)" >&2
            return 1
          fi
          echo "v$((major - 4)).${rest}"
        }

        if [[ "${EVENT_NAME}" == "workflow_dispatch" && -n "${IN_JANS_BRANCH}" ]]; then
          valid_ref "${IN_JANS_BRANCH}" || { echo "::error::invalid jans_branch input"; exit 1; }
          JANS_BRANCH="${IN_JANS_BRANCH}"
        else
          JANS_BRANCH="$(derive_jans_branch)" || exit 1
        fi

        if [[ "${EVENT_NAME}" == "workflow_dispatch" && -n "${IN_JANS_SETUP_BRANCH}" ]]; then
          valid_ref "${IN_JANS_SETUP_BRANCH}" || { echo "::error::invalid jans_setup_branch input"; exit 1; }
          JANS_SETUP_BRANCH="${IN_JANS_SETUP_BRANCH}"
        else
          JANS_SETUP_BRANCH="${JANS_BRANCH}"
        fi

        printf 'JANS_BRANCH=%s\n' "${JANS_BRANCH}" >> "$GITHUB_ENV"
        printf 'JANS_SETUP_BRANCH=%s\n' "${JANS_SETUP_BRANCH}" >> "$GITHUB_ENV"
        echo "Resolved JANS_BRANCH=${JANS_BRANCH}  JANS_SETUP_BRANCH=${JANS_SETUP_BRANCH}"

    - name: Print Version and tag
      run: |
        echo "Version: ${{ steps.previoustag.outputs.version }}"
        echo "Tag: ${{ steps.previoustag.outputs.tag }}"
        echo "Jans Branch: ${{ env.JANS_BRANCH }}"
        echo "Jans Setup Branch: ${{ env.JANS_SETUP_BRANCH }}"
    - name: Running install and build
      id: run_build
      run: |
        cd flex/
        sudo python${{ matrix.python_version }} flex_setup.py --jans-branch="${{ env.JANS_BRANCH }}" --jans-setup-branch="${{ env.JANS_SETUP_BRANCH }}" -download-exit -yes --keep-downloads --keep-setup -force-download
        cp -r /opt/dist flex-src/opt/
        cp -r /opt/jans flex-src/opt/
        touch flex-src/opt/jans/jans-setup/package
        rm -rf install.py install jans-cli
        rm -rf flex-src/opt/jans/jans-setup/logs/setup.log
        rm -rf flex-src/opt/jans/jans-setup/logs/setup_error.log
        sed -i "s/%VERSION%/${{ steps.previoustag.outputs.version }}/g" run-build.sh
        cat run-build.sh
        sudo ./run-build.sh

    - name: Install Cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

    - name: Sign package
      id: sign_package
      run: |
        OS="${{ matrix.name }}"
        VERSION="${{ steps.previoustag.outputs.version }}"
        SUFFIX="${{ matrix.asset_suffix }}"
        ARTIFACT="${{github.workspace}}/${{ matrix.asset_path }}/flex${{ matrix.asset_prefix }}${{ steps.previoustag.outputs.version }}${{ matrix.asset_suffix }}"
        cosign sign-blob --yes --bundle flex-${OS}-${VERSION}.bundle "${ARTIFACT}"

    - name: Create checksum
      id: create_checksum
      run: |
        cd flex/
        sed -i "s/%VERSION%/${{ steps.previoustag.outputs.version }}/g" checksum.sh
        sudo ./checksum.sh
        ls ${{github.workspace}}/${{ matrix.asset_path }}

    - name: Upload assets to release
      env:
        GH_TOKEN: ${{ secrets.MOWORKFLOWTOKEN }}
      run: |
        OS="${{ matrix.name }}"
        VERSION="${{ steps.previoustag.outputs.version }}"
        SUFFIX="${{ matrix.asset_suffix }}"
        
        # On a tag push the release may not exist yet (release-trigger pushes the tag --
        # which starts this build -- then creates the release; parallel matrix legs also
        # race to create it), so ensure it exists idempotently before uploading.
        if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
          gh release view "${{ steps.previoustag.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1 \
            || gh release create "${{ steps.previoustag.outputs.tag }}" --repo "${{ github.repository }}" --title "${{ steps.previoustag.outputs.tag }}" --generate-notes \
            || gh release view "${{ steps.previoustag.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1
        fi

        gh release upload ${{ steps.previoustag.outputs.tag }} \
          "${{github.workspace}}/${{ matrix.asset_path }}/flex${{ matrix.asset_prefix }}${VERSION}${SUFFIX}" \
          "${{github.workspace}}/flex-${OS}-${VERSION}.bundle" \
          --repo ${{ github.repository }} \
          --clobber
